execution:
  spread_bps: 1.0
  min_spread: 0.01
  slippage_k: 0.1
  delay_bars: 0
  fee_bps: 0.5
strategy:
  name: session_breakout
  qty: 1.0
  buffer_pct: 0.0
  only_in_session: true
montecarlo_paths: 500
