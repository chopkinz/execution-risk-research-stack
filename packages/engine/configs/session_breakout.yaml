seed: 42
symbol: "^NDX"
interval: "15m"
period: "60d"
session:
  start: "08:30"
  end: "10:30"
portfolio:
  initial_cash: 100000.0
risk:
  max_position_size: 1.0
  max_trades_per_day: 4
  max_daily_loss_pct: 0.02
  max_drawdown_pct: 0.2
