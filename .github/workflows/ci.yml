name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r packages/engine/requirements.txt
          PYTHONPATH=packages/engine/src python -m pip install -e packages/engine

      - name: Engine tests
        run: PYTHONPATH=packages/engine/src python -m pytest -q packages/engine/tests

      - name: Engine smoke run
        run: PYTHONPATH=packages/engine/src python -m engine.scripts.demo --out apps/web/public/research/latest

      - name: Web verify
        working-directory: apps/web
        run: bun install && bun run verify
